# ── v2 dev stack ─────────────────────────────────────────────────────
# Host-networked containers sharing the host's Postgres, ROMs, and cores.
#
# Start:
#   ./scripts/dev-start.sh build    # build host binaries + Docker images
#   ./scripts/dev-start.sh start    # docker compose up -d
#
# Stop:
#   ./scripts/dev-start.sh stop     # docker compose down
#
# Status:
#   ./scripts/dev-start.sh status   # docker compose ps + health
#   ./scripts/dev-start.sh logs     # docker compose logs -f

services:
  sc-web:
    build:
      context: .
      dockerfile: docker/sc-web/Dockerfile
    network_mode: host
    restart: unless-stopped
    volumes:
      # Source code (hot-reload in dev) — repo root for workspace
      - .:/app
      # Shadow host node_modules with container's pre-installed deps (per workspace member)
      - sc-web-node-modules:/app/sc-web/node_modules
      - sc-web-node-modules-pnpm:/app/node_modules
      - sc-player-node-modules:/app/sc-player/node_modules
    environment:
      NODE_ENV: development
      # sc-web env
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://sprite_cloud@127.0.0.1:5433/sprite_cloud}
      GV_ICE_STUN_URLS: ${GV_ICE_STUN_URLS:-stun:stun.l.google.com:19302}
      GV_ICE_TURN_URLS: ${GV_ICE_TURN_URLS:-}
      GV_ICE_TURN_USERNAME: ${GV_ICE_TURN_USERNAME:-}
      GV_ICE_TURN_CREDENTIAL: ${GV_ICE_TURN_CREDENTIAL:-}
      GV_ICE_TRANSPORT_POLICY: ${GV_ICE_TRANSPORT_POLICY:-all}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sc-server:
    build:
      context: .
      dockerfile: docker/sc-server/Dockerfile
    network_mode: host
    restart: on-failure:3
    depends_on:
      sc-web:
        condition: service_healthy
    volumes:
      # Host-built release binary
      - ./target/release/sc-server:/usr/local/bin/sc-server:ro
      - ./test-data/cores:/cores:rw
      # Host config
      - /etc/sprite-cloud/config.toml:/etc/sprite-cloud/config.toml:ro
      # ROMs
      - /srv/storage/games/roms:/srv/storage/games/roms:ro
      # Saves + system dirs
      - sc-server-saves:/saves
      - sc-server-system:/system
    environment:
      XDG_CONFIG_HOME: /etc
      GV_WEB_URL: ${GV_WEB_URL:-http://localhost:3000}
      GV_API_KEY: ${GV_API_KEY:-}
      GV_CORES_DIR: /cores
      GV_ROM_ROOTS: ${GV_ROM_ROOTS:-/srv/storage/games/roms}
      GV_SAVE_DIR: /saves
      GV_SYSTEM_DIR: /system
      ALLOWED_ORIGIN: ${AUTH_URL:-http://localhost:3000}
      GV_ICE_STUN_URLS: ${GV_ICE_STUN_URLS:-stun:stun.l.google.com:19302}
      GV_ICE_TURN_URLS: ${GV_ICE_TURN_URLS:-}
      GV_ICE_TURN_USERNAME: ${GV_ICE_TURN_USERNAME:-}
      GV_ICE_TURN_CREDENTIAL: ${GV_ICE_TURN_CREDENTIAL:-}
      GV_ICE_TRANSPORT_POLICY: ${GV_ICE_TRANSPORT_POLICY:-all}
      RUST_LOG: ${RUST_LOG:-info}
      # ── GStreamer encoder tuning ──
      GV_GST_VIDEO_CPU_USED: ${GV_GST_VIDEO_CPU_USED:-8}
      GV_GST_VIDEO_THREADS: ${GV_GST_VIDEO_THREADS:-4}
      GV_GST_VIDEO_BITRATE_KBPS: ${GV_GST_VIDEO_BITRATE_KBPS:-2000}
      GV_GST_VIDEO_DEADLINE: ${GV_GST_VIDEO_DEADLINE:-1}
      # Integer scaling: nearest-neighbor upscale core output to at least this height.
      # 0 = off (passthrough). e.g. 1080 → NES 240p → 4× → 960p.
      GV_GST_VIDEO_SCALE_HEIGHT: ${GV_GST_VIDEO_SCALE_HEIGHT:-1080}
      # Cap the integer scale factor (default 4). Prevents excessive upscaling
      # that overwhelms the VP8 encoder at low bitrates.
      GV_GST_VIDEO_MAX_SCALE: ${GV_GST_VIDEO_MAX_SCALE:-2}
      GV_GST_AUDIO_BITRATE: ${GV_GST_AUDIO_BITRATE:-64000}
    healthcheck:
      test: ["CMD", "pgrep", "sc-server"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sc-web-node-modules:
  sc-web-node-modules-pnpm:
  sc-player-node-modules:
  sc-server-saves:
  sc-server-system:
