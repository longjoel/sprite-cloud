[package]
name = "gv-worker"
version = "0.1.0"
edition = "2024"
description = "Games Vault worker — per-game process launched by gv-server"

[[bin]]
name = "gv-worker"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
image = "0.25"
