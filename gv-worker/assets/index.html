<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Games Vault</title>
<style>
  :root {
    --gv-mahogany: #1a1410; --gv-brass: #b8964a;
    --gv-cream: #e8dcc8; --gv-muted: #b8a888;
    --gv-cyan: #00e5ff; --gv-error: #ff4d4d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--gv-mahogany);
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--gv-cream);
    font-size: 13px;
    overflow: hidden;
    height: 100vh; width: 100vw;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  video {
    width: 100%; height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    background: #000;
  }
  #overlay {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    background: linear-gradient(transparent, rgba(26,20,16,.92));
    display: flex; justify-content: space-between; align-items: flex-end;
    pointer-events: none; z-index: 10;
  }
  #status { font-size: 12px; color: var(--gv-muted); }
  #status.ok { color: var(--gv-cyan); }
  #status.err { color: var(--gv-error); }
  #hint { font-size: 10px; color: var(--gv-muted); opacity: .5; text-align: right; }
</style>
</head>
<body>
<div id="stage"><video id="video" autoplay playsinline muted></video></div>
<div id="overlay">
  <span id="status">connecting…</span>
  <span id="hint">Q=Select W=Start | arrows=move | Z=B X=A</span>
</div>
<script type="module" src="connect.js"></script>
</body>
</html>
