<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Games Vault</title>
<style>
  :root {
    --gv-mahogany: #1a1410; --gv-brass: #b8964a;
    --gv-cream: #e8dcc8; --gv-muted: #b8a888;
    --gv-cyan: #00e5ff; --gv-error: #ff4d4d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--gv-mahogany);
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--gv-cream);
    font-size: 13px;
    overflow: hidden;
    height: 100vh; width: 100vw;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  video {
    width: 100%; height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    background: #000;
  }
  #overlay {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    background: linear-gradient(transparent, rgba(26,20,16,.92));
    display: flex; justify-content: space-between; align-items: flex-end;
    pointer-events: none; z-index: 10;
  }
  #status { font-size: 12px; color: var(--gv-muted); }
  #status.ok { color: var(--gv-cyan); }
  #status.err { color: var(--gv-error); }
  #hint { font-size: 10px; color: var(--gv-muted); opacity: .5; text-align: right; }
</style>
</head>
<body>
<div id="stage"><video id="video" autoplay playsinline muted></video></div>
<div id="overlay">
  <span id="status">connecting…</span>
  <span id="hint">Q=Select W=Start | arrows=move | Z=B X=A</span>
</div>
<script>
var q=new URLSearchParams(location.search);
var PEER_TOKEN=q.get(...||"";
var ROLE=q.get("role")||"player";
var SEAT=parseInt(q.get("seat")||"0");
var video=document.getElementById("video");
var statusEl=document.getElementById("status");
function setStatus(msg,cls){if(statusEl){statusEl.textContent=msg;statusEl.className=cls||""}}
var ICE=[{urls:["stun:stun.l.google.com:19302","stun:stun1.l.google.com:19302"]},{urls:"turn:lngnckr.tech:3478",username:"gv",credential:"43b908d07b1f25c97553d43d317ee5fb"}];

// RetroArch joypad bit mapping (NES subset)
var KEY_MAP={
  "ArrowUp":1,"ArrowDown":2,"ArrowLeft":4,"ArrowRight":8,
  "z":64,"x":128,"Enter":16,"Shift":32,"w":32,"q":16,"a":64,"s":128,
};
var inputState=0;

function sendInput(){
  if(!dc||dc.readyState!=="open")return;
  try{dc.send(new Uint8Array([SEAT,inputState&0xFF,inputState>>8]).buffer)}catch(e){}
}

var dc=null;

document.addEventListener("keydown",function(e){
  var bit=KEY_MAP[e.key.toLowerCase()]||KEY_MAP[e.key];
  if(bit){inputState|=bit;sendInput();e.preventDefault()}
});
document.addEventListener("keyup",function(e){
  var bit=KEY_MAP[e.key.toLowerCase()]||KEY_MAP[e.key];
  if(bit){inputState&=~bit;sendInput();e.preventDefault()}
});

(async()=>{
if(!video)return;
try{
var pc=new RTCPeerConnection({iceServers:ICE});
dc=pc.createDataChannel("diagnostics");
dc.onopen=function(){sendInput()};

pc.onconnectionstatechange=function(){
  var cs=pc.connectionState;
  if(cs==="connected")setStatus("connected","ok");
  else if(cs==="disconnected"||cs==="failed")setStatus(cs,"err");
  else setStatus(cs);
};
pc.ontrack=function(e){
  if(!video.srcObject)video.srcObject=new MediaStream();
  video.srcObject.addTrack(e.track);
  video.play().catch(function(){});
};
pc.addTransceiver("video",{direction:"recvonly"});
pc.addTransceiver("audio",{direction:"recvonly"});
setStatus("signaling…");
var offer=await pc.createOffer();
await pc.setLocalDescription(offer);
await new Promise(function(r){
  if(pc.iceGatheringState==="complete")r();
  else pc.addEventListener("icegatheringstatechange",function(){
    if(pc.iceGatheringState==="complete")r();
  });
});
setStatus("connecting…");
var resp=await fetch("/sdp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({sdp:pc.localDescription.sdp,peer_token:PEER_TOKEN,peer_role:ROLE,peer_seat:SEAT})});
if(!resp.ok){setStatus("SDP failed: "+resp.status,"err");return}
var answer=await resp.json();
var clean=answer.sdp.split("\n").filter(function(l){return !l.trimStart().startsWith("a=extmap:")}).join("\n");
await pc.setRemoteDescription({type:"answer",sdp:clean});
console.log("[gv] WebRTC connected via direct SDP");
}catch(e){setStatus(e.message,"err");console.error(e)}
})();
</script>
</body>
</html>
