name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/sprite-cloud

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly \
            libglib2.0-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Rust release binaries
        run: cargo build --release -p gv-server

      - name: Test Rust crates
        run: cargo test -p gv-server -p gv-core -p libretro-runner

      - name: Smoke test libretro-runner
        run: cargo test -p libretro-runner --test smoke -- --test-threads=1

      - name: Upload gv-server binary
        uses: actions/upload-artifact@v4
        with:
          name: gv-server-binary
          path: target/release/gv-server
          retention-days: 1

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build gv-web
        run: pnpm build

      - name: Upload gv-web standalone output
        uses: actions/upload-artifact@v4
        with:
          name: gv-web-standalone
          path: gv-web/.next/standalone/gv-web
          retention-days: 1

  docker:
    name: Build and push Docker images
    needs: [rust, web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ── gv-server: place binary at repo root ──────────────────────
      - name: Download gv-server binary
        uses: actions/download-artifact@v4
        with:
          name: gv-server-binary
          path: .

      - name: Mark gv-server executable
        run: chmod +x gv-server

      # ── gv-web: place standalone output at repo root ──────────────
      - name: Download gv-web standalone
        uses: actions/download-artifact@v4
        with:
          name: gv-web-standalone
          path: gv-web-standalone

      # ── Login ─────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Metadata ──────────────────────────────────────────────────
      - name: Docker metadata (gv-server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/gv-server
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (gv-web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/gv-web
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build and push ────────────────────────────────────────────
      - name: Build and push gv-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/gv-server/Dockerfile.ci
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: Build and push gv-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/gv-web/Dockerfile.ci
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
