name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'sc-web/**'
      - 'sc-player/**'
      - 'docker/sc-web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: |
          docker build \
            -f docker/sc-web/Dockerfile.prod \
            -t sc-web-prod:latest .

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
          name: vps-key

      - name: Transfer image to VPS
        run: |
          docker save sc-web-prod:latest | gzip | \
            ssh -o StrictHostKeyChecking=accept-new \
              root@sprite-cloud.com 'gunzip | docker load'

      - name: Restart sc-web on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new root@sprite-cloud.com '
            cd /docker/sc-web && \
            docker compose down sc-web && \
            docker compose up -d sc-web
          '

      - name: Health check
        run: |
          sleep 10
          for i in $(seq 1 6); do
            STATUS=$(ssh -o StrictHostKeyChecking=accept-new root@sprite-cloud.com \
              'curl -sf http://localhost:3000/api/health' && echo "ok" || echo "fail")
            if [ "$STATUS" = "ok" ]; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Waiting... ($i/6)"
            sleep 5
          done
          echo "✗ Health check failed after 6 attempts"
          exit 1
