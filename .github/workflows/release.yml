name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-server:
    name: Build sc-server (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly \
            libglib2.0-dev pkg-config
          # Cross-compilers for aarch64
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build sc-server
        env:
          CARGO_BUILD_JOBS: ${{ matrix.arch == 'aarch64' && '1' || '4' }}
        run: cargo build --release -p sc-server --target ${{ matrix.target }}

      - name: Upload binary as release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/sc-server

  create-release:
    name: Create GitHub Release
    needs: [build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize and checksum artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets

          if [ -d artifacts/x86_64 ]; then
            cp artifacts/x86_64/sc-server release-assets/sc-server-x86_64
            sha256sum release-assets/sc-server-x86_64 > release-assets/sc-server-x86_64.sha256
          fi
          if [ -d artifacts/aarch64 ]; then
            cp artifacts/aarch64/sc-server release-assets/sc-server-aarch64
            sha256sum release-assets/sc-server-aarch64 > release-assets/sc-server-aarch64.sha256
          fi

          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            release-assets/*
