name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-x86_64:
    name: Build sc-server (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly \
            libglib2.0-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build sc-server
        run: cargo build --release -p sc-server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: x86_64
          path: target/release/sc-server

  build-aarch64:
    name: Build sc-server (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build sc-server
        run: cross build --release -p sc-server --target aarch64-unknown-linux-gnu

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: aarch64
          path: target/aarch64-unknown-linux-gnu/release/sc-server

  create-release:
    name: Create GitHub Release
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize and checksum artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets

          for arch in x86_64 aarch64; do
            if [ -f "artifacts/$arch/sc-server" ]; then
              cp "artifacts/$arch/sc-server" "release-assets/sc-server-$arch"
              sha256sum "release-assets/sc-server-$arch" > "release-assets/sc-server-$arch.sha256"
            fi
          done

          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            release-assets/*
