name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build gv-server
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libglib2.0-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build gv-server
        run: cargo build --release -p gv-server --target ${{ matrix.target }}

      - name: Upload binary as release asset
        uses: actions/upload-artifact@v4
        with:
          name: gv-server-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/gv-server

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          for dir in */; do
            arch="${dir%/}"
            sha256sum "$dir/gv-server" > "../gv-server-${arch}.sha256"
            mv "$dir/gv-server" "../gv-server-${arch}"
          done
          cd ..
          ls -la gv-server-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v') }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            gv-server-x86_64
            gv-server-x86_64.sha256
