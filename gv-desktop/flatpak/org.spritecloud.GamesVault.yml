app-id: org.spritecloud.GamesVault
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: games-vault
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.secrets
  - --env=GDK_BACKEND=x11
  - --env=GSK_RENDERER=cairo
modules:
  - name: games-vault
    buildsystem: simple
    build-commands:
      - |
        set -e
        . /usr/lib/sdk/rust-stable/enable.sh
        cargo build --release --manifest-path Cargo.toml --features app_debug
        install -Dm755 target/release/gv-desktop /app/bin/games-vault
        install -Dm644 icons/32x32.png /app/share/icons/hicolor/32x32/apps/org.spritecloud.GamesVault.png
        install -Dm644 icons/128x128.png /app/share/icons/hicolor/128x128/apps/org.spritecloud.GamesVault.png
        install -Dm644 icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/org.spritecloud.GamesVault.png
        install -Dm644 flatpak/org.spritecloud.GamesVault.desktop /app/share/applications/org.spritecloud.GamesVault.desktop
        install -Dm644 flatpak/org.spritecloud.GamesVault.metainfo.xml /app/share/metainfo/org.spritecloud.GamesVault.metainfo.xml
    sources:
      - type: dir
        path: ..
    build-options:
      build-args:
        - --share=network
