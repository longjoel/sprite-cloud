<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Games Vault — Player</title>
<style>
  /* Games Humidor — Embedded Player Design Tokens */
  :root {
    --color-mahogany: #1a1410;
    --color-teak: #2d2418;
    --color-walnut: #3d3020;
    --color-bamboo: #4a3a28;
    --color-brass: #b8964a;
    --color-cream: #e8dcc8;
    --color-muted: #b8a888;
    --color-cyan: #00e5ff;
    --color-error: #ff4d4d;
    --font-mono: "SF Mono", "Fira Code", monospace;
    --space-unit: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--color-mahogany);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: var(--color-cream);
    font-family: var(--font-mono);
    font-size: 14px;
  }
  video {
    image-rendering: pixelated;
    max-width: 100vw;
    max-height: 80vh;
    border: 1px solid var(--color-brass);
    background: #000;
  }
  #status { margin-top: 12px; font-size: 12px; color: var(--color-muted); }
  #controls-hint { margin-top: 8px; font-size: 11px; color: var(--color-muted); opacity: 0.5; }
  .error { color: var(--color-error); }
</style>
</head>
<body>
<video id="video" autoplay playsinline muted controls></video>
<pre id="status">connecting…</pre>
<pre id="controls-hint">Q=Start W=Select | arrows/WASD=move | Z=B X=A</pre>
<script type="module" src="index.js"></script>
</body>
</html>
