<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Games Vault — Player</title>
<style>
  /* ═══════════════════════════════════════════════════════════════════════
     Games Humidor — Design Tokens (matches gv-web globals.css)
     1960s Neo-Futurism — warm wood tones, brass trim, neon accents.
     ═══════════════════════════════════════════════════════════════════════ */

  :root {
    --color-mahogany: #1a1410;
    --color-teak: #2d2418;
    --color-walnut: #3d3020;
    --color-bamboo: #4a3a28;
    --color-brass: #b8964a;
    --color-copper: #c4723a;
    --color-cream: #e8dcc8;
    --color-muted: #b8a888;
    --color-cyan: #00e5ff;
    --color-magenta: #ff3d7f;
    --color-lime: #a0ff40;
    --color-success: #4dff88;
    --color-warning: #ffb830;
    --color-error: #ff4d4d;
    --color-info: #00e5ff;

    --space-0: 0;
    --space-1: 2px;
    --space-2: 4px;
    --space-3: 6px;
    --space-4: 8px;
    --space-5: 12px;
    --space-6: 16px;
    --space-7: 24px;
    --space-8: 32px;

    --radius-sm: 2px;
    --radius-md: 4px;

    --font-size-xs: 10px;
    --font-size-sm: 12px;
    --font-size-base: 13px;
    --font-size-md: 14px;

    --font-mono: "Geist Mono", "SF Mono", "Fira Code", monospace;
    --font-sans: "Geist", "SF Pro", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: var(--font-mono);
    color: var(--color-cream);
  }

  /* ── Video layer (full-viewport, same as GamePlayer) ─────────────── */

  video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    background: #000;
  }

  /* ── Top bar overlay (game title area) ──────────────────────────── */

  #top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-4) var(--space-6);
    background: rgba(0,0,0,0.6);
    z-index: 10;
    transition: opacity 0.3s;
  }

  #route-indicator {
    font-size: var(--font-size-sm);
    color: var(--color-muted);
    font-family: var(--font-mono);
  }

  /* ── Bottom bar overlay (controls hint + status) ────────────────── */

  #bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-3) var(--space-6);
    background: rgba(0,0,0,0.6);
    z-index: 10;
    transition: opacity 0.3s;
    gap: var(--space-4);
  }

  #controls-hint {
    font-size: var(--font-size-sm);
    color: var(--color-muted);
    font-family: var(--font-mono);
  }

  #nintendo-toggle {
    font-size: var(--font-size-xs);
    font-family: var(--font-mono);
    background: transparent;
    border: 1px solid var(--color-bamboo);
    color: var(--color-muted);
    padding: var(--space-2) var(--space-4);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: 0.15s;
    white-space: nowrap;
    user-select: none;
    -webkit-user-select: none;
  }

  #nintendo-toggle:hover {
    color: var(--color-cream);
    border-color: var(--color-brass);
  }

  #nintendo-toggle.active {
    color: var(--color-lime);
    border-color: var(--color-lime);
    background: rgba(160,255,64,0.08);
  }

  #status {
    font-size: var(--font-size-xs);
    color: var(--color-muted);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── Status states ───────────────────────────────────────────────── */

  #status.ok     { color: var(--color-success); }
  #status.err    { color: var(--color-error); }
  #status.warn   { color: var(--color-warning); }

  /* ── Connecting overlay (centered, shown before video starts) ───── */

  #connecting-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 20;
    transition: opacity 0.4s;
    font-family: var(--font-mono);
  }

  #connecting-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #connecting-text {
    font-size: var(--font-size-md);
    color: var(--color-muted);
    margin-bottom: var(--space-4);
  }

  #connecting-detail {
    font-size: var(--font-size-xs);
    color: var(--color-walnut);
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>

<div id="connecting-overlay">
  <div id="connecting-text">connecting…</div>
  <div id="connecting-detail">signaling</div>
</div>

<div id="top-bar">
  <span id="route-indicator"></span>
</div>

<div id="bottom-bar">
  <span id="controls-hint">Q=Start · W=Select · Arrows=Move · Z=B · X=A</span>
  <button id="nintendo-toggle" title="Nintendo layout — swap A↔B, X↔Y">🎮 SNES</button>
  <span id="status">connecting…</span>
</div>

<script type="module" src="/player/player-bundle.js"></script>
</body>
</html>
