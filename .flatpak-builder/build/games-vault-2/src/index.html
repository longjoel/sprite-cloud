<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games Vault — Connecting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container { text-align: center; padding: 2rem; max-width: 480px; }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    .spinner {
      display: inline-block;
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 0.95rem; color: #aaa; min-height: 1.5rem; }
    .error-box {
      display: none;
      background: #1a0a0a;
      border: 1px solid #5c1a1a;
      border-radius: 8px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      text-align: left;
    }
    .error-box.visible { display: block; }
    .error-box h2 { color: #ef4444; font-size: 1rem; margin-bottom: 0.5rem; }
    .error-box p { color: #999; font-size: 0.85rem; line-height: 1.5; margin-bottom: 0.5rem; }
    .error-box code {
      display: block;
      background: #111;
      padding: 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #ccc;
      word-break: break-all;
      margin-bottom: 1rem;
    }
    .btn {
      display: inline-block;
      background: #7c3aed;
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #6d28d9; }
    .retry-count { color: #666; font-size: 0.75rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎮</div>
    <h1>Games Vault</h1>
    <p class="subtitle">Sprite Cloud Desktop</p>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">Connecting to Games Vault...</p>
    <div class="retry-count" id="retryCount"></div>
    <div class="error-box" id="errorBox">
      <h2>⚠️ Connection Failed</h2>
      <p>Unable to reach the Games Vault server. This could be due to:</p>
      <p>• No internet connection<br>
         • Server is offline<br>
         • Network firewall blocking access</p>
      <p>Target URL:</p>
      <code id="errorUrl"></code>
      <button class="btn" onclick="retry()">Retry Connection</button>
    </div>
  </div>

  <script>
    const REMOTE_URL = 'https://lngnckr.tech/xmb';
    const MAX_RETRIES = 3;
    const RETRY_DELAY_MS = 3000;
    const LOAD_TIMEOUT_MS = 15000;

    let retryCount = 0;
    let loadTimer = null;

    function updateStatus(msg, isError) {
      document.getElementById('status').textContent = msg;
      document.getElementById('status').style.color = isError ? '#ef4444' : '#aaa';
    }

    function showError() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('errorBox').classList.add('visible');
      document.getElementById('errorUrl').textContent = REMOTE_URL;
      updateStatus('Connection failed', true);
    }

    function showSpinner() {
      document.getElementById('spinner').style.display = 'inline-block';
      document.getElementById('errorBox').classList.remove('visible');
    }

    function updateRetryCount() {
      var el = document.getElementById('retryCount');
      if (retryCount > 0) {
        el.textContent = 'Retry ' + retryCount + ' of ' + MAX_RETRIES;
      } else {
        el.textContent = '';
      }
    }

    function retry() {
      retryCount = 0;
      updateRetryCount();
      showSpinner();
      updateStatus('Connecting to Games Vault...', false);
      attemptLoad();
    }

    function attemptLoad() {
      if (retryCount >= MAX_RETRIES) {
        showError();
        updateStatus('Max retries reached. ' + REMOTE_URL + ' may be unavailable.', true);
        return;
      }

      updateRetryCount();
      updateStatus('Connecting to Games Vault... (attempt ' + (retryCount + 1) + ')', false);

      // Use fetch to test connectivity, then navigate on success
      clearTimeout(loadTimer);
      loadTimer = setTimeout(function() {
        retryCount++;
        updateStatus('Connection timed out. Retrying...', true);
        setTimeout(attemptLoad, RETRY_DELAY_MS);
      }, LOAD_TIMEOUT_MS);

      // Try to fetch the remote URL to verify connectivity
      fetch(REMOTE_URL, { mode: 'no-cors' })
        .then(function() {
          clearTimeout(loadTimer);
          // Connection succeeded — navigate to the real app
          console.log('[gv-loader] Remote reachable, navigating to ' + REMOTE_URL);
          window.location.replace(REMOTE_URL);
        })
        .catch(function(err) {
          clearTimeout(loadTimer);
          retryCount++;
          console.warn('[gv-loader] Fetch failed: ' + err.message);
          updateStatus('Cannot reach server. Retrying in ' + (RETRY_DELAY_MS / 1000) + 's...', true);
          setTimeout(attemptLoad, RETRY_DELAY_MS);
        });
    }

    // Start the connection process
    console.log('[gv-loader] Fallback loader initializing, target: ' + REMOTE_URL);
    attemptLoad();
  </script>
</body>
</html>
