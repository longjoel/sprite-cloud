services:
  gv-web:
    image: gv-web:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
