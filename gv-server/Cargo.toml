[package]
name = "gv-server"
version = "0.1.0"
edition = "2024"
description = "Games Vault server — runs on user's computer, serves ROM library"

[[bin]]
name = "gv-server"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.8"
